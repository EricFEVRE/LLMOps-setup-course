# LiteLLM Proxy Configuration

model_list:
  # Primary: Gemini 2.5 Flash (free tier)
  - model_name: gemini-primary
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # Backup: OpenAI
  - model_name: openai-backup
    litellm_params:
      model: gpt-4o-mini  
      api_key: os.environ/OPENAI_API_KEY

router_settings:
  fallbacks:
    - "gemini-primary": ["openai-backup"]

litellm_settings:
  callbacks: ["mlflow"]
  log_level: DEBUG

callback_settings:
  mlflow:
    experiment_name: "llmops-new"
    log_prompts: true         # pour tracer les prompts
    log_responses: true       # pour tracer les réponses
    log_model_info: true      # pour tracer les infos du modèle