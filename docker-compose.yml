services:
  # FastAPI application
  api:
    build:
      context: .
      dockerfile: ./src/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LITELLM_URL=http://litellm:8000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - litellm
      - mlflow
    volumes:
      - .:/app
      - ./mlflow-data:/mlflow-data
    working_dir: /app
    networks:
      - llmops-network
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # LiteLLM proxy
  litellm:
    build:
      context: .
      dockerfile: ./litellm/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./litellm/litellm-config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "8000"]
    networks:
      - llmops-network
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MLflow for prompt tracing  ← bien indenté sous "services"
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow-data:/mlflow-data
    networks:
      - llmops-network
    environment:
      - MLFLOW_SERVER_HOST=0.0.0.0
      - MLFLOW_SERVER_ALLOWED_HOSTS=mlflow,localhost,127.0.0.1,*
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow-data/mlflow.db
      --default-artifact-root file:///mlflow-data/mlartifacts
      --serve-artifacts
      --allowed-hosts "mlflow,localhost,127.0.0.1,*"

  # Portainer - UI de monitoring
  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - llmops-network
    restart: unless-stopped    

networks:
  llmops-network:
    driver: bridge

volumes:
  portainer-data: